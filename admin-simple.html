<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quiz Results</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .simple-admin {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box h3 {
            font-size: 2em;
            margin: 0;
        }
        .stat-box p {
            margin: 5px 0 0 0;
            opacity: 0.9;
        }
        .students-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .students-table th,
        .students-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .students-table th {
            background: var(--primary-color);
            color: white;
            font-weight: 600;
        }
        .students-table tr:hover {
            background: #f8f9fa;
        }
        .score-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .score-high { background: #d4edda; color: #155724; }
        .score-medium { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
        .status-completed { color: #28a745; }
        .status-pending { color: #6c757d; }
        .btn-upload {
            background: var(--success-color);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="simple-admin">
        <div class="admin-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <img src="https://via.placeholder.com/150x150/4285F4/FFFFFF?text=DEPT" alt="Department Logo" style="width: 60px; height: 60px; border-radius: 8px;">
                <h1><i class="fas fa-user-shield"></i> Quiz Admin Panel</h1>
            </div>
            <button onclick="logout()" class="btn btn-secondary">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="stats-cards">
            <div class="stat-box">
                <h3 id="totalStudents">0</h3>
                <p>Total Students</p>
            </div>
            <div class="stat-box">
                <h3 id="completedCount">0</h3>
                <p>Completed</p>
            </div>
            <div class="stat-box">
                <h3 id="avgScore">0%</h3>
                <p>Avg Score</p>
            </div>
        </div>

        <a href="upload-csv.html?admin=admin2024" class="btn-upload">
            <i class="fas fa-file-csv"></i> Upload Students CSV
        </a>

        <h2><i class="fas fa-trophy"></i> Leaderboard (Sorted by Correct Answers, then Time Taken)</h2>
        <table class="students-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Score</th>
                    <th>Correct Answers</th>
                    <th>Time Taken</th>
                    <th>Submitted At</th>
                </tr>
            </thead>
            <tbody id="studentsTableBody">
                <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // Protect admin page
        const urlParams = new URLSearchParams(window.location.search);
        const adminAccess = urlParams.get('admin');
        
        if (adminAccess !== 'admin2024') {
            window.location.href = 'index.html';
        }

        // Format time utility function
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        async function loadStudents() {
            let supabase = window.getSupabase();
            let attempts = 0;
            while (!supabase && attempts < 20) {
                await new Promise(r => setTimeout(r, 100));
                supabase = window.getSupabase();
                attempts++;
            }
            
            if (!supabase) {
                alert('Database not ready');
                return;
            }

            const { data: students, error } = await supabase
                .from('students')
                .select('*')
                .order('correct_answers', { ascending: false })
                .order('time_taken', { ascending: true });
            
            if (error) {
                console.error('Error:', error);
                return;
            }

            // Update stats
            document.getElementById('totalStudents').textContent = students.length;
            const completed = students.filter(s => s.has_attempted).length;
            document.getElementById('completedCount').textContent = completed;
            
            const attemptedStudents = students.filter(s => s.has_attempted && s.quiz_score !== null);
            const avgScore = attemptedStudents.length > 0 
                ? Math.round(attemptedStudents.reduce((sum, s) => sum + s.quiz_score, 0) / attemptedStudents.length)
                : 0;
            document.getElementById('avgScore').textContent = avgScore + '%';

            // Render table
            const tbody = document.getElementById('studentsTableBody');
            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No students found</td></tr>';
                return;
            }

            tbody.innerHTML = students.map((s, index) => {
                const scoreClass = s.quiz_score >= 70 ? 'score-high' : s.quiz_score >= 40 ? 'score-medium' : 'score-low';
                const submittedAt = s.quiz_completed_at 
                    ? new Date(s.quiz_completed_at).toLocaleString() 
                    : '-';
                const timeTaken = s.time_taken 
                    ? formatTime(s.time_taken) 
                    : '-';
                const correctAnswers = s.correct_answers !== null 
                    ? `${s.correct_answers}/${30}` 
                    : '-';
                return `
                    <tr>
                        <td><strong>${index + 1}</strong></td>
                        <td><strong>${s.full_name}</strong></td>
                        <td class="${s.has_attempted ? 'status-completed' : 'status-pending'}">
                            <i class="fas fa-${s.has_attempted ? 'check-circle' : 'clock'}"></i>
                            ${s.has_attempted ? 'Completed' : 'Pending'}
                        </td>
                        <td>
                            ${s.quiz_score !== null 
                                ? `<span class="score-badge ${scoreClass}">${s.quiz_score}%</span>` 
                                : '-'}
                        </td>
                        <td>${correctAnswers}</td>
                        <td>${timeTaken}</td>
                        <td>${submittedAt}</td>
                    </tr>
                `;
            }).join('');
        }

        function logout() {
            window.location.href = 'index.html';
        }

        // Load on page load
        loadStudents();
        // Refresh every 10 seconds
        setInterval(loadStudents, 10000);
    </script>
</body>
</html>
