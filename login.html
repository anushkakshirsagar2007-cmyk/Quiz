<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AIML Quiz Competition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="auth-header">
            <h1><i class="fas fa-sign-in-alt"></i> Student Login</h1>
            <p>Enter your credentials to access the quiz</p>
        </header>

        <main class="auth-main">
            <div class="auth-form-container">
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="userId">
                            <i class="fas fa-user"></i> Name
                        </label>
                        <input type="text" id="userId" name="userId" required 
                               placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="password" name="password" required 
                               placeholder="Enter your system-generated password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="auth-links">
                    <p><a href="index.html">Back to Home</a></p>
                </div>
            </div>
        </main>

        <div id="errorModal" class="modal">
            <div class="modal-content">
                <div class="modal-header error">
                    <h3><i class="fas fa-exclamation-circle"></i> Login Failed</h3>
                </div>
                <div class="modal-body">
                    <p id="errorMessage">Invalid credentials. Please try again.</p>
                </div>
                <div class="modal-footer">
                    <button onclick="closeErrorModal()" class="btn btn-secondary">Close</button>
                </div>
            </div>
        </div>

        <div id="alreadyAttemptedModal" class="modal">
            <div class="modal-content">
                <div class="modal-header warning">
                    <h3><i class="fas fa-exclamation-triangle"></i> Quiz Already Attempted</h3>
                </div>
                <div class="modal-body">
                    <p>You have already attempted the quiz. Each student is allowed only one attempt.</p>
                    <p>If you believe this is an error, please contact the administrator.</p>
                </div>
                <div class="modal-footer">
                    <button onclick="closeAlreadyAttemptedModal()" class="btn btn-secondary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="login.js"></script>
</body>
</html>
